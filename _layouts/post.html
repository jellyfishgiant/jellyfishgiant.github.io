---
layout: default
---
<article class="post-article">
    <div class="post-header">
        <h2 class="post-title">{{ page.title }}</h2>
        <p class="post-date">{{ page.date | date: "%B %d, %Y" }}</p>
    </div>
    <div class="post-content">
        {{ content }}
    </div>
    <div class="post-back">
        <a href="/blog/" class="back-link">&larr; all posts</a>
    </div>
</article>
